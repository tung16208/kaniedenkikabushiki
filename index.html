<style>
/* ══════════════════════════════════════════════
   STAFF PORTAL — カニエ電機株式会社
   スタッフ専用ポータル
══════════════════════════════════════════════ */
:root{
  --navy:#0d2b4e;--navy2:#1a3f6b;--navy3:#0a1f3a;
  --blue:#2563a8;--blue2:#3b82f6;
  --orange:#e85d2f;--orange2:#ff7a52;
  --bg:#eef2f7;--sur:#fff;--sur2:#f5f8fc;--sur3:#ebf0f7;
  --bdr:#d5dfe8;--bdr2:#c0cfde;
  --txt:#0d2b4e;--txb:#2d3e52;--txs:#607080;--txl:#8fa3b8;
  --rad:14px;--rads:9px;
  --shd:0 4px 24px rgba(13,43,78,.13);--shds:0 2px 10px rgba(13,43,78,.09);
  --ok:#0f7c4a;--err:#c82020;--warn:#b45309;
  --ok-bg:#ecfdf5;--err-bg:#fef2f2;--warn-bg:#fffbeb;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Noto Sans JP','Sora',sans-serif;background:var(--bg);color:var(--txb);min-height:100%;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:99px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,32,32,.3)}50%{box-shadow:0 0 0 6px rgba(200,32,32,0)}}
@keyframes newBadge{0%{transform:scale(0)}80%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ══ LOGIN SCREEN ══ */
#loginScreen{
  display:flex;min-height:100vh;
  background:linear-gradient(160deg,var(--navy3) 0%,var(--navy) 60%,var(--navy2) 100%);
  align-items:center;justify-content:center;padding:20px;
  position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;
}
.login-deco{position:absolute;border-radius:50%;pointer-events:none;}
.login-deco1{top:-120px;right:-120px;width:400px;height:400px;background:radial-gradient(circle,rgba(232,93,47,.18),transparent 70%);}
.login-deco2{bottom:-100px;left:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(37,99,168,.2),transparent 70%);}
.login-card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,.97);
  border-radius:24px;box-shadow:0 24px 64px rgba(0,0,0,.4);
  overflow:hidden;position:relative;z-index:1;
  animation:slideUp .45s cubic-bezier(.22,.68,0,1.2);
}
.lc-header{
  background:linear-gradient(135deg,var(--navy3),var(--navy));
  padding:24px 26px 20px;border-bottom:3px solid var(--orange);
}
.lc-header-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.lc-logo{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:24px;}
.lc-company{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:#fff;line-height:1.2;}
.lc-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.lc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,93,47,.18);border:1px solid rgba(232,93,47,.35);color:var(--orange2);padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;font-family:'Sora',sans-serif;}
.lc-body{padding:22px 26px 24px;}
.lc-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:4px;font-family:'Sora',sans-serif;}
.lc-desc{font-size:12px;color:var(--txs);margin-bottom:20px;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:5px;letter-spacing:.3px;}
.fld input{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-family:inherit;background:var(--sur2);color:var(--txt);outline:none;transition:.2s;}
.fld input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,168,.1);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:42px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--txl);}
.login-err{background:var(--err-bg);border:1.5px solid #fca5a5;color:var(--err);padding:9px 13px;border-radius:var(--rads);font-size:12px;margin-bottom:12px;display:none;animation:shake .35s;}
.btn-login{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;border:none;border-radius:var(--rads);
  font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:.3px;transition:.2s;
  box-shadow:0 4px 16px rgba(13,43,78,.35);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-login:hover{transform:translateY(-1px);opacity:.95;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.lc-footer{border-top:1px solid var(--bdr);padding:12px 26px;font-size:10.5px;color:var(--txl);display:flex;justify-content:space-between;}

/* ══ TOP BAR ══ */
.topbar{
  position:sticky;top:0;z-index:200;height:56px;
  background:linear-gradient(135deg,var(--navy3),var(--navy));
  border-bottom:3px solid var(--orange);
  display:flex;align-items:center;padding:0 20px;gap:10px;
  box-shadow:0 2px 16px rgba(13,43,78,.35);
}
.tb-logo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tb-name{color:#fff;font-size:13px;font-weight:800;font-family:'Sora',sans-serif;white-space:nowrap;}
.tb-sub{font-size:8.5px;color:rgba(255,255,255,.38);letter-spacing:1.5px;text-transform:uppercase;}
.tb-divider{width:1px;height:28px;background:rgba(255,255,255,.15);flex-shrink:0;}
.tb-caption{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.8px;font-family:'Sora',sans-serif;font-weight:600;}
.tb-spacer{flex:1;}
.sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:99px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.65);}
#syncDot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
#syncDot.syncing{background:#fbbf24;animation:pulse .8s ease infinite;}
#syncDot.error{background:#f87171;}
.user-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.9);padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-notif{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.8);padding:4px 11px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-notif:hover{background:rgba(255,255,255,.2);}
.btn-logout{background:transparent;border:1.5px solid rgba(255,255,255,.28);color:rgba(255,255,255,.8);padding:5px 13px;border-radius:var(--rads);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,.6);}

/* ══ LAYOUT ══ */
.app-shell{display:none;flex-direction:column;min-height:100vh;}
.app-shell.show{display:flex;}
.main-content{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:24px 20px 80px;}

/* ══ PAGE HEADER ══ */
.page-hd{margin-bottom:22px;}
.page-hd h1{font-size:22px;font-weight:800;color:var(--navy);font-family:'Sora',sans-serif;display:flex;align-items:center;gap:10px;}
.page-hd p{font-size:12px;color:var(--txs);margin-top:4px;}
.ph-line{height:3px;width:40px;background:linear-gradient(90deg,var(--orange),var(--orange2));border-radius:2px;margin-top:8px;}

/* ══ STATS ROW ══ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 10px;text-align:center;box-shadow:var(--shds);}
.stat-n{font-size:28px;font-weight:800;color:var(--navy);font-family:'Sora',sans-serif;}
.stat-l{font-size:10.5px;color:var(--txs);margin-top:3px;}

/* ══ TOOLBAR ══ */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;}
.fb{padding:6px 14px;border:1.5px solid var(--bdr);border-radius:99px;font-size:12px;font-weight:600;font-family:inherit;background:var(--sur);color:var(--txs);cursor:pointer;transition:.15s;}
.fb.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.fb.ok-act{background:var(--ok);color:#fff;border-color:var(--ok);}
.fb.warn-act{background:#d97706;color:#fff;border-color:#d97706;}
.fb.blue-act{background:var(--blue);color:#fff;border-color:var(--blue);}
.tb-spacer2{flex:1;}
.btn-excel{padding:7px 15px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:var(--rads);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px;}
.search-wrap input{width:100%;padding:7px 12px 7px 34px;border:1.5px solid var(--bdr);border-radius:99px;font-size:12.5px;font-family:inherit;background:var(--sur2);color:var(--txt);outline:none;}
.search-wrap input:focus{border-color:var(--blue);background:#fff;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}

/* ══ REQUEST CARDS ══ */
.rlist{display:flex;flex-direction:column;gap:10px;}
.rc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;border-left:4px solid var(--bdr);box-shadow:var(--shds);transition:box-shadow .2s;}
.rc:hover{box-shadow:var(--shd);}
.rc.s-miteii{border-left-color:#f59e0b;}
.rc.s-jissyu{border-left-color:#3b82f6;}
.rc.s-kanryo{border-left-color:#10b981;}
.rc-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none;}
.rc-header:hover{background:var(--sur2);}
.rc-left{flex:1;min-width:0;}
.rc-top-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.rc-co{font-size:13.5px;font-weight:800;color:var(--navy);}
.rc-date{font-size:11px;color:var(--txl);}
.rc-shiji{font-size:13px;font-weight:700;color:var(--txb);}
.rc-kiki{font-size:12px;color:var(--txs);margin-top:2px;}
.rc-tanto{font-size:11.5px;color:var(--txs);}
.rc-chev{font-size:12px;color:var(--txl);transition:transform .25s;flex-shrink:0;}
.rc.open .rc-chev{transform:rotate(180deg);}
.rc-detail{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s;opacity:0;}
.rc.open .rc-detail{max-height:3000px;opacity:1;}
.rc-inner{padding:0 16px 16px;border-top:1px solid var(--bdr);}

/* Status badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.b-m{background:#fef3c7;color:#92400e;}
.b-j{background:#dbeafe;color:#1e40af;}
.b-k{background:#d1fae5;color:#065f46;}

/* New msg badge */
.new-msg-badge{background:var(--orange);color:#fff;font-size:9.5px;font-weight:800;padding:1px 7px;border-radius:99px;animation:newBadge .3s ease;}

/* Info rows */
.info-rows{margin:10px 0;}
.info-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--sur3);}
.info-row:last-child{border-bottom:none;}
.ir-l{font-size:11px;color:var(--txs);font-weight:600;min-width:78px;flex-shrink:0;}
.ir-v{font-size:12.5px;color:var(--txb);font-weight:500;}
.rc-biko{background:var(--sur2);border-left:3px solid var(--orange);padding:8px 11px;border-radius:var(--rads);font-size:12.5px;margin:8px 0;}

/* Staff actions */
.rc-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:10px 0 4px;border-top:1px solid var(--bdr);margin-top:8px;}
.ssel{padding:6px 10px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:12.5px;font-family:inherit;background:var(--sur2);color:var(--txb);cursor:pointer;outline:none;}
.ssel.m{border-color:#fcd34d;background:#fef3c7;color:#92400e;}
.ssel.j{border-color:#93c5fd;background:#dbeafe;color:#1e40af;}
.ssel.k{border-color:#6ee7b7;background:#d1fae5;color:#065f46;}
.btn-accept{padding:7px 15px;background:var(--navy);color:#fff;border:none;border-radius:var(--rads);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-accept:disabled{background:var(--ok);cursor:not-allowed;opacity:.85;}
.btn-taihi{padding:7px 13px;background:var(--warn-bg);color:var(--warn);border:1.5px solid #fcd34d;border-radius:var(--rads);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:7px;margin:8px 0;}
.img-t{position:relative;border-radius:var(--rads);overflow:hidden;aspect-ratio:1;background:var(--sur3);cursor:pointer;}
.img-t img{width:100%;height:100%;object-fit:cover;}

/* Edit history */
.edit-hist{margin-top:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rads);padding:10px 12px;}
.eh-title{font-size:11px;font-weight:700;color:var(--txs);margin-bottom:6px;}
.eh-item{font-size:11px;color:var(--txs);padding:5px 0;border-bottom:1px solid var(--bdr);}
.eh-item:last-child{border-bottom:none;}

/* ══ CHAT ══ */
.staff-chat{margin-top:12px;border-top:1px solid var(--bdr);padding-top:10px;}
.chat-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.chat-title{font-size:12px;font-weight:700;color:var(--navy);}
.chat-cnt{min-width:18px;height:18px;border-radius:99px;background:var(--navy);color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sc-msgs{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:8px;padding-right:2px;}
.sc-msg{display:flex;flex-direction:column;gap:2px;}
.sc-msg.from-client-staff{align-items:flex-start;}
.sc-msg.from-staff-msg{align-items:flex-end;}
.sc-meta{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txl);}
.sc-tag{padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;}
.sc-tag.c{background:#dbeafe;color:#1e40af;}
.sc-tag.s{background:var(--ok-bg);color:#065f46;}
.sc-text{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12.5px;line-height:1.5;}
.from-client-staff .sc-text{background:var(--sur2);border:1px solid var(--bdr);border-bottom-left-radius:4px;color:var(--txb);}
.from-staff-msg .sc-text{background:var(--navy);color:#fff;border-bottom-right-radius:4px;}
.no-chat{font-size:12px;color:var(--txl);text-align:center;padding:12px;}
.sc-form{display:flex;gap:6px;align-items:flex-end;}
.sc-input{flex:1;min-height:38px;max-height:100px;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:13px;font-family:inherit;outline:none;resize:none;background:var(--sur2);color:var(--txt);}
.sc-input:focus{border-color:var(--blue);background:#fff;}
.btn-mic{
  padding:8px 10px;background:var(--sur2);color:var(--txs);
  border:1.5px solid var(--bdr);border-radius:var(--rads);
  font-size:16px;cursor:pointer;flex-shrink:0;transition:.15s;
}
.btn-mic:hover{background:var(--sur3);}
.btn-mic.recording{background:#fee2e2;border-color:#fca5a5;color:#c82020;animation:micPulse .8s ease infinite;}
.btn-sc-send{padding:8px 14px;background:var(--navy);color:#fff;border:none;border-radius:var(--rads);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-sc-send:hover{background:var(--navy2);}

/* ══ TENANTS TAB ══ */
.tenant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.t-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);padding:16px;box-shadow:var(--shds);border-top:4px solid var(--bdr);}
.t-card.active{border-top-color:var(--ok);}
.tc-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tc-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tc-nm{font-size:14px;font-weight:700;color:var(--navy);}
.tc-id{font-size:10px;color:var(--txl);font-family:monospace;margin-top:1px;}
.tc-url{display:flex;align-items:center;gap:6px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rads);padding:6px 10px;font-size:11.5px;font-family:monospace;color:var(--txs);word-break:break-all;margin-bottom:8px;}
.btn-copy-url{background:var(--navy);color:#fff;border:none;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.tc-stats{display:flex;gap:6px;flex-wrap:wrap;}
.tc-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;background:var(--sur2);border:1px solid var(--bdr);color:var(--txs);}
.tc-chip.ok{background:var(--ok-bg);color:#065f46;border-color:#6ee7b7;}
.tc-chip.warn{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.tc-chip.err{background:var(--err-bg);color:var(--err);border-color:#fca5a5;}

/* ══ TABS ══ */

.modal-hd h3{color:#fff;font-size:14px;font-weight:700;}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:27px;height:27px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px;}
.modal-body .fld label{color:var(--navy);}
.modal-body select,.modal-body textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:13.5px;font-family:inherit;background:var(--sur2);color:var(--txt);outline:none;}

/* ══ IMAGE LIGHTBOX ══ */
#imgModal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:12px;display:none;}

/* ══ NOTIFICATION BANNER ══ */

<!-- ══════════════════════════════════
  JAVASCRIPT
══════════════════════════════════ -->
<script>
/* ══ CONFIG ══ */
const EJ_KEY = "_efCoOTySMW7-n5dK", EJ_SVC = "service_qo6afaf", EJ_TPL = "template_3wrvxdq";
const NOTIFY = "damthanhtung1911@gmail.com";
emailjs.init(EJ_KEY);

/* ══ STAFF ACCOUNTS ══ */
function simpleHash(s){
  let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;
}
const STAFF_USERS = {
  "staff-01": { hash: simpleHash("staff001"), name: "山田 太郎", short: "山田 太郎" },
  "staff-02": { hash: simpleHash("staff002"), name: "鈴木 花子", short: "鈴木 花子" },
  "admin":    { hash: simpleHash("kanie-admin2024"), name: "管理者（カニエ電機）", short: "管理者" },
};

/* ══ STATE ══ */
let cu = null;
let _allReqs = [];
let _allTenants = [];
let _allDevices = [];
let _unsubReqs = [];
let _unsubTenants = null;
let _unsubDevices = null;
let _knownReqIds = new Set();
let _statusFilter = 'all';
let _tenantFilter = 'all';
let _devFilter = 'all';
let _taihiId = null;
let _currentTab = 'reqs';

/* ══ FIREBASE WAIT ══ */
function _waitFb(cb){
  if(window._fbReady) cb();
  else document.addEventListener('fb-ready', cb, {once:true});
}

/* ══ AUTH ══ */
function togglePw(){
  const inp = document.getElementById('loginPw');
  const btn = document.querySelector('.pw-eye');
  if(inp.type === 'password'){ inp.type='text'; btn.textContent='🙈'; }
  else { inp.type='password'; btn.textContent='👁'; }
}

function doLogin(){
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  if(!id || !pw){ err.textContent='⚠️ IDとパスワードを入力してください'; err.style.display='block'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span>⏳</span> 確認中…';
  setTimeout(() => {
    const u = STAFF_USERS[id];
    if(!u || simpleHash(pw) !== u.hash){
      err.textContent = '⚠️ IDまたはパスワードが正しくありません';
      err.style.display = 'block';
      btn.disabled=false; btn.innerHTML='<span>🔐</span> ログイン';
      return;
    }
    btn.disabled=false; btn.innerHTML='<span>🔐</span> ログイン';
    completeLogin({id, ...u});
  }, 350);
}

function completeLogin(u){
  cu = u;
  try{ sessionStorage.setItem('sp_session', JSON.stringify({id:u.id})); }catch(e){}
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').classList.add('show');
  document.getElementById('staffName').textContent = u.short;
  initData();
  requestNotifPerm();
}

function doLogout(){
  try{ sessionStorage.removeItem('sp_session'); }catch(e){}
  cu = null;
  _unsubAll();
  _allReqs=[]; _allTenants=[]; _allDevices=[];
  document.getElementById('appShell').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
}

/* ══ FIRESTORE INIT ══ */
function initData(){
  setSyncStatus('syncing');
  _waitFb(() => {
    // Subscribe tenants
    _unsubTenants = window._fs.onSnapshot(
      window._fs.collection(window._db, 'tenants'),
      snap => {
        _allTenants = snap.docs.map(d => ({...d.data(), id: d.id}));
        renderTenantsTab();
        buildTenantFilterRow();
        updateStats();
      }, e => { console.error(e); setSyncStatus('error'); }
    );

    // Subscribe devices
    _unsubDevices = window._fs.onSnapshot(
      window._fs.collection(window._db, 'devices'),
      snap => {
        const prevPendingIds = new Set(_allDevices.filter(d=>d.status==='pending').map(d=>d.deviceId));
        _allDevices = snap.docs.map(d => d.data());
        // Notify new pending device
        if(_knownReqIds.size > 0){
          _allDevices.filter(d => d.status==='pending' && !prevPendingIds.has(d.deviceId)).forEach(d => {
            const t = _allTenants.find(t2=>t2.id===d.tenantId);
            notifyNewDevice(t ? `${t.icon||'🏢'} ${t.name}` : d.tenantId, d.label||'不明', d.deviceId);
          });
        }
        renderDevicesTab();
        updateTabBadges();
      }, e => console.error(e)
    );

    // Subscribe reqs from all tenants
    _subscribeAllTenantReqs();
  });
}

function _subscribeAllTenantReqs(){
  // We listen to /tenants collection first then subscribe each tenant's reqs
  // Use a broad subscription approach: listen to tenants then sub each
  _waitFb(() => {
    // Get known tenants and subscribe
    const tenantIds = _allTenants.map(t => t.id);
    // Also listen to common tenant IDs
    const commonIds = ['T001','T002','sugatec','kaisha-b'];
    const allIds = [...new Set([...tenantIds, ...commonIds])];
    allIds.forEach(tid => _subscribeTenantReqs(tid));

    // Re-subscribe when tenants change
    window._fs.onSnapshot(window._fs.collection(window._db, 'tenants'), snap => {
      snap.docs.forEach(d => {
        if(!_subscribedTenants.has(d.id)) _subscribeTenantReqs(d.id);
      });
    });
  });
}

const _subscribedTenants = new Set();
function _subscribeTenantReqs(tenantId){
  if(_subscribedTenants.has(tenantId)) return;
  _subscribedTenants.add(tenantId);
  _waitFb(() => {
    const colRef = window._fs.collection(window._db, `tenants/${tenantId}/reqs`);
    const unsub = window._fs.onSnapshot(colRef, snap => {
      const incoming = snap.docs.map(d => d.data());
      // Detect new reqs
      incoming.forEach(r => {
        if(r.status === '未定' && !_knownReqIds.has(String(r.id)) && _knownReqIds.size > 0){
          notifyNewReq(r);
        }
        _knownReqIds.add(String(r.id));
      });
      // Merge: remove old data for this tenant, add new
      _allReqs = _allReqs.filter(r => r.tenantId !== tenantId).concat(incoming);
      setSyncStatus('ok');
      renderReqs();
      updateStats();
      updateTabBadges();
    }, e => { console.error('tenant reqs', e); setSyncStatus('ok'); });
    _unsubReqs.push(unsub);
  });
}

function _unsubAll(){
  _unsubReqs.forEach(u => { try{u();}catch(e){} });
  _unsubReqs = [];
  _subscribedTenants.clear();
  if(_unsubTenants){ try{_unsubTenants();}catch(e){} _unsubTenants=null; }
  if(_unsubDevices){ try{_unsubDevices();}catch(e){} _unsubDevices=null; }
  _knownReqIds.clear();
}

function saveReq(req){
  if(!req||!req.id||!req.tenantId) return;
  setSyncStatus('syncing');
  _waitFb(async () => {
    try{
      await window._fs.setDoc(window._fs.doc(window._db, `tenants/${req.tenantId}/reqs`, String(req.id)), req);
      setSyncStatus('ok');
    }catch(e){ console.error(e); setSyncStatus('error'); showToast('⚠️ 同期エラー','error'); }
  });
}

/* ══ STATS ══ */
function updateStats(){
  document.getElementById('statTotal').textContent = _allReqs.length;
  document.getElementById('statPend').textContent = _allReqs.filter(r=>r.status==='未定').length;
  document.getElementById('statActive').textContent = _allReqs.filter(r=>r.status==='実施中').length;
  document.getElementById('statDone').textContent = _allReqs.filter(r=>r.status==='完了').length;
}

function updateTabBadges(){
  const pend = _allReqs.filter(r=>r.status==='未定').length;
  const pendDev = _allDevices.filter(d=>d.status==='pending').length;
  const rb = document.getElementById('tabReqsBadge');
  const db = document.getElementById('tabDevBadge');
  if(rb){ rb.textContent=pend; rb.style.display=pend>0?'flex':'none'; }
  if(db){ db.textContent=pendDev; db.style.display=pendDev>0?'flex':'none'; }
}

/* ══ TAB SWITCH ══ */
function switchTab(name, btn){
  _currentTab = name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  const pageMap = {reqs:'pageReqs', tenants:'pageTenants', devices:'pageDevices'};
  document.getElementById(pageMap[name]).classList.add('active');
}

/* ══ TENANT FILTER ROW ══ */
function buildTenantFilterRow(){
  const row = document.getElementById('tenantFilterRow');
  if(!row) return;
  let html = `<button class="fb ${_tenantFilter==='all'?'active':''}" onclick="setTenantFilter('all',this)">🏢 すべて</button>`;
  html += _allTenants.map(t =>
    `<button class="fb" style="${_tenantFilter===t.id?'background:'+t.color+';color:#fff;border-color:'+t.color:''}" onclick="setTenantFilter('${t.id}',this)">${t.icon||'🏢'} ${escHtml(t.name)}</button>`
  ).join('');
  row.innerHTML = html;
}

function setTenantFilter(tid, btn){
  _tenantFilter = tid;
  buildTenantFilterRow();
  renderReqs();
}

function setStatusFilter(s, btn){
  _statusFilter = s;
  document.querySelectorAll('#statusFilters .fb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderReqs();
}

function setDevFilter(s, btn){
  _devFilter = s;
  document.querySelectorAll('#devStatusFilters .fb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderDevicesTab();
}

/* ══ RENDER REQUESTS ══ */
function renderReqs(){
  const el = document.getElementById('reqsContent');
  if(!el) return;
  const q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  let data = [..._allReqs];
  if(_tenantFilter !== 'all') data = data.filter(r => r.tenantId === _tenantFilter || r.kaisha === _tenantFilter);
  if(_statusFilter !== 'all') data = data.filter(r => r.status === _statusFilter);
  if(q) data = data.filter(r =>
    (r.kaisha||'').toLowerCase().includes(q) ||
    (r.kiki||'').toLowerCase().includes(q) ||
    (r.tanto||'').toLowerCase().includes(q) ||
    (r.shiji||'').toLowerCase().includes(q)
  );
  data.sort((a,b) => (b.id||0) - (a.id||0));

  if(!data.length){

function toggleRc(id){
  const card = document.getElementById(`rc-${id}`);
  if(!card) return;
  const open = card.classList.toggle('open');
  const chev = card.querySelector('.rc-chev');
  if(chev) chev.style.transform = open ? 'rotate(180deg)' : '';
  if(open){
    setTimeout(() => {

      if(sm) sm.scrollTop = sm.scrollHeight;
    }, 60);
  }

/* ══ CHAT ══ */
function sendChat(id){
  const ta = document.getElementById(`scIn-${id}`);
  if(!ta) return;
  const text = ta.value.trim();
  if(!text){ showToast('メッセージを入力してください','error'); return; }
  const r = _allReqs.find(r => String(r.id) === String(id));
  if(!r) return;
  if(!r.comments) r.comments = [];
  r.comments.push({id:Date.now(), author:cu.short, date:nowStr(), text, fromClient:false});
  saveReq(r);
  ta.value = '';
  showToast(`📨 客先「${r.kaisha}」へメッセージを送信しました`, 'ok');
  emailjs.send(EJ_SVC, EJ_TPL, {
    shisetsumei:r.kaishaFull||r.kaisha, shiji:`【メッセージ通知】${r.shiji}`,
    kiki:r.kiki, biko:text, tanto:r.tanto,
    date:nowStr(), to_email:NOTIFY, from_email:"tung16208@gmail.com"
  }).catch(e=>console.error(e));
}

/* ══ VOICE INPUT ══ */
let _voiceRecognition = null;
let _voiceActiveId = null;

function toggleVoice(reqId){
  if(_voiceActiveId && _voiceActiveId !== reqId) stopVoice(_voiceActiveId);
  if(_voiceActiveId === reqId){ stopVoice(reqId); return; }
  startVoice(reqId);
}

function startVoice(reqId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('⚠️ このブラウザは音声入力に対応していません','error'); return; }
  const ta = document.getElementById(`scIn-${reqId}`);
  const btn = document.getElementById(`micBtn-${reqId}`);
  if(!ta || !btn) return;
  _voiceRecognition = new SR();
  _voiceRecognition.lang = 'ja-JP';
  _voiceRecognition.continuous = true;
  _voiceRecognition.interimResults = true;
  let _base = ta.value;
  _voiceRecognition.onstart = () => {
    _voiceActiveId = reqId;
    btn.classList.add('recording');
    btn.textContent = '⏹';
    ta.placeholder = '🎤 音声認識中…';
    showToast('🎤 音声入力を開始しました','ok');
  };
  _voiceRecognition.onresult = (e) => {
    let fin='', interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(fin) _base += fin;
    ta.value = _base + interim;
  };
  _voiceRecognition.onerror = (e) => {
    if(e.error==='not-allowed') showToast('⚠️ マイクへのアクセスが拒否されました','error');
    else if(e.error!=='no-speech') showToast('⚠️ 音声認識エラー','error');
    stopVoice(reqId);
  };
  _voiceRecognition.onend = () => { if(_voiceActiveId===reqId) stopVoice(reqId); };
  try{ _voiceRecognition.start(); }catch(e){ showToast('⚠️ 音声入力を開始できませんでした','error'); }
}

function stopVoice(reqId){
  if(_voiceRecognition){ try{_voiceRecognition.stop();}catch(e){} _voiceRecognition=null; }
  _voiceActiveId = null;
  const btn = document.getElementById(`micBtn-${reqId}`);
  const ta = document.getElementById(`scIn-${reqId}`);
  if(btn){ btn.classList.remove('recording'); btn.textContent='🎤'; }
  if(ta) ta.placeholder = '客先へメッセージを送る…';
}

  btnClose.onclick = () => banner.remove();
  container.appendChild(banner);
  setTimeout(() => { if(banner.parentNode) banner.remove(); }, 25000);
}

function playSound(freqs){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.25, ctx.currentTime+i*.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*.12+.1);
      osc.start(ctx.currentTime+i*.12); osc.stop(ctx.currentTime+i*.12+.12);
    });
  }catch(e){}
}

/* ══ NOTIFICATIONS PERMISSION ══ */
function requestNotifPerm(){
  if(!('Notification' in window)) return;
  const btn = document.getElementById('notifBtn');
  if(Notification.permission==='granted'){
    if(btn){ btn.textContent='🔔 通知ON'; btn.style.background='rgba(74,222,128,.2)'; btn.style.borderColor='rgba(74,222,128,.4)'; }
    return;
  }
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p => {
      if(p==='granted'){
        showToast('🔔 通知を有効にしました','ok');
        if(btn){ btn.textContent='🔔 通知ON'; btn.style.background='rgba(74,222,128,.2)'; btn.style.borderColor='rgba(74,222,128,.4)'; }
        new Notification('✅ 通知が有効になりました',{body:'新しい作業依頼をリアルタイムでお知らせします'});
      }
    });
  }
}

/* ══ EXCEL EXPORT ══ */
function exportExcel(){
  if(!_allReqs.length){ showToast('データがありません','warn'); return; }
  const H=['客先','指示内容','機器','備考','日付','担当者','担当スタッフ','状況','テナントID'];
  const ws=XLSX.utils.aoa_to_sheet([H,..._allReqs.map(r=>[r.kaisha,r.shiji,r.kiki,r.biko||'',r.date,r.tanto,r.acceptedBy||'',r.status,r.tenantId||''])]);
  ws['!cols']=[{wch:14},{wch:10},{wch:30},{wch:24},{wch:18},{wch:12},{wch:12},{wch:10},{wch:12}];
  ws['!autofilter']={ref:ws['!ref']};
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'依頼一覧（全テナント）');
  // Per-tenant sheets
  [...new Set(_allReqs.map(r=>r.kaisha).filter(Boolean))].forEach(k => {
    const ws2=XLSX.utils.aoa_to_sheet([H,..._allReqs.filter(r=>r.kaisha===k).map(r=>[r.kaisha,r.shiji,r.kiki,r.biko||'',r.date,r.tanto,r.acceptedBy||'',r.status,r.tenantId||''])]);
    ws2['!cols']=[{wch:14},{wch:10},{wch:30},{wch:24},{wch:18},{wch:12},{wch:12},{wch:10},{wch:12}];
    ws2['!autofilter']={ref:ws2['!ref']};
    XLSX.utils.book_append_sheet(wb,ws2,k.substring(0,31));
  });
  const now=new Date();
  XLSX.writeFile(wb,`スタッフ管理_${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}.xlsx`);
  showToast('Excelをダウンロードしました','ok');
}

/* ══ IMAGE LIGHTBOX ══ */
let _lbImages=[], _lbIdx=0;
function openImgModal(reqId, idx){
  const r = _allReqs.find(r=>String(r.id)===String(reqId));
  if(!r||!r.images||!r.images[idx]) return;
  _lbImages = r.images; _lbIdx = idx;
  document.getElementById('imgModalImg').src = _lbImages[_lbIdx].dataUrl;
  document.getElementById('imgModal').style.display = 'flex';
}
function closeImgModal(){ document.getElementById('imgModal').style.display='none'; }

/* ══ COPY URL ══ */
function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>showToast('✅ URLをコピーしました','ok')).catch(()=>showToast('コピーに失敗しました','error'));
}

/* ══ SYNC STATUS ══ */
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'), txt=document.getElementById('syncTxt');
  if(!dot) return;
  dot.className='';
  if(s==='syncing'){dot.classList.add('syncing');if(txt)txt.textContent='同期中…';}
  else if(s==='error'){dot.classList.add('error');if(txt)txt.textContent='エラー';}
  else{if(txt)txt.textContent='同期済み';}
}

/* ══ HELPERS ══ */
function p2(n){return String(n).padStart(2,'0');}
function nowStr(){const d=new Date();return `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3500);
}

  // Show login

});
